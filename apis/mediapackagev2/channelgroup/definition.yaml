apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xchannelgroup.mediapackagev2.aws.livewyer.io
spec:
  group: mediapackagev2.aws.livewyer.io
  names:
    kind: XChannelGroup
    plural: xchannelgroups
  claimNames:
    kind: ChannelGroup
    plural: channelgroups
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    channelGroupName:
                      type: string
                      description: "The name of the channel group."
                      pattern: "^[a-zA-Z0-9_-]+$"
                      minLength: 1
                      maxLength: 256
                    description:
                      type: string
                      description: "The configuration for a MediaPackage V2 channel group."
                      minLength: 0
                      maxLength: 1024
                    region:
                      type: string
                      description: "AWS region where the channel group will be created."
                      default: "us-east-1"
                    tags:
                      type: object
                      description: "A map of tags to assign to the resource."
                      additionalProperties:
                        type: string
                  required:
                    - channelGroupName
                  additionalProperties: false
                deletionPolicy:
                  type: string
                  enum:
                    - Delete
                    - Orphan
                  default: Delete
                  description: "DeletionPolicy specifies what will happen to the underlying external when this managed resource is deleted."
                managementPolicies:
                  type: array
                  items:
                    type: string
                    enum:
                      - "*"
                      - Create
                      - Update
                      - Delete
                      - LateInitialize
                      - Observe
                  default: ["*"]
                  description: "ManagementPolicies specify the array of actions Crossplane is allowed to take on the managed and external resources."
                providerConfigRef:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                    - name
                  description: "ProviderConfigReference specifies how the provider that will be used to create, observe, update, and delete this managed resource should be configured."
                publishConnectionDetailsTo:
                  type: object
                  properties:
                    name:
                      type: string
                    configRef:
                      type: object
                      properties:
                        name:
                          type: string
                      required:
                        - name
                    metadata:
                      type: object
                      properties:
                        labels:
                          type: object
                          additionalProperties:
                            type: string
                        annotations:
                          type: object
                          additionalProperties:
                            type: string
                        type:
                          type: array
                          items:
                            type: string
                  required:
                    - name
                  description: "PublishConnectionDetailsTo specifies the connection secret config which contains a name, metadata and a reference to secret store config to which any connection details for this managed resource should be written."
                writeConnectionSecretsToNamespace:
                  type: string
                  description: "WriteConnectionSecretsToNamespace specifies the namespace in which the connection secrets of this managed resource should be written."
              required:
                - parameters
              additionalProperties: false
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                    required:
                      - lastTransitionTime
                      - reason
                      - status
                      - type
                connectionDetails:
                  type: object
                  properties:
                    lastPublishedTime:
                      type: string
                      format: date-time
                arn:
                  type: string
                  description: "The Amazon Resource Name (ARN) of the channel group."
                createdAt:
                  type: string
                  description: "The timestamp of the creation of the channel group."
                  format: date-time
                modifiedAt:
                  type: string
                  description: "The timestamp of the modification of the channel group."
                  format: date-time
                egressDomain:
                  type: string
                  description: "The egress domain of the channel group."
          required:
            - spec
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: ".status.conditions[?(@.type=='Ready')].status"
        - name: SYNCED
          type: string
          jsonPath: ".status.conditions[?(@.type=='Synced')].status"
        - name: EXTERNAL-NAME
          type: string
          jsonPath: ".metadata.annotations.crossplane\\.io/external-name"
        - name: EGRESS-DOMAIN
          type: string
          jsonPath: ".status.egressDomain"
        - name: AGE
          type: date
          jsonPath: ".metadata.creationTimestamp"
