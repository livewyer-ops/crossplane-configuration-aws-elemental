apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xnetwork.medialive.aws.livewyer.io
spec:
  group: medialive.aws.livewyer.io
  names:
    kind: XNetwork
    plural: xnetworks
  claimNames:
    kind: Network
    plural: networks
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "The user-specified name of the Network to be created."
                    ipPools:
                      type: array
                      description: "The list of IP address cidr pools for the network."
                      items:
                        type: object
                        properties:
                          cidr:
                            type: string
                            description: "The CIDR block for the IP pool."
                            pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$"
                        required:
                          - cidr
                        additionalProperties: false
                      minItems: 1
                    routes:
                      type: array
                      description: "The routes for the network."
                      items:
                        type: object
                        properties:
                          cidr:
                            type: string
                            description: "The CIDR block for the route."
                            pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$"
                          gateway:
                            type: string
                            description: "The gateway IP address for the route."
                        additionalProperties: false
                    region:
                      type: string
                      description: "AWS region where the network will be created."
                      default: "us-east-1"
                    tags:
                      type: object
                      description: "A collection of key-value pairs."
                      additionalProperties:
                        type: string
                  required:
                    - name
                    - ipPools
                  additionalProperties: false
                deletionPolicy:
                  type: string
                  enum:
                    - Delete
                    - Orphan
                  default: Delete
                  description: "DeletionPolicy specifies what will happen to the underlying external when this managed resource is deleted."
                managementPolicies:
                  type: array
                  items:
                    type: string
                    enum:
                      - "*"
                      - Create
                      - Update
                      - Delete
                      - LateInitialize
                      - Observe
                  default: ["*"]
                  description: "ManagementPolicies specify the array of actions Crossplane is allowed to take on the managed and external resources."
                providerConfigRef:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                    - name
                  description: "ProviderConfigReference specifies how the provider that will be used to create, observe, update, and delete this managed resource should be configured."
                publishConnectionDetailsTo:
                  type: object
                  properties:
                    name:
                      type: string
                    configRef:
                      type: object
                      properties:
                        name:
                          type: string
                      required:
                        - name
                    metadata:
                      type: object
                      properties:
                        labels:
                          type: object
                          additionalProperties:
                            type: string
                        annotations:
                          type: object
                          additionalProperties:
                            type: string
                        type:
                          type: array
                          items:
                            type: string
                  required:
                    - name
                  description: "PublishConnectionDetailsTo specifies the connection secret config which contains a name, metadata and a reference to secret store config to which any connection details for this managed resource should be written."
                writeConnectionSecretsToNamespace:
                  type: string
                  description: "WriteConnectionSecretsToNamespace specifies the namespace in which the connection secrets of this managed resource should be written."
              required:
                - parameters
              additionalProperties: false
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                    required:
                      - lastTransitionTime
                      - reason
                      - status
                      - type
                connectionDetails:
                  type: object
                  properties:
                    lastPublishedTime:
                      type: string
                      format: date-time
                arn:
                  type: string
                  description: "The Amazon Resource Name (ARN) of the network."
                associatedClusterIds:
                  type: array
                  description: "The cluster IDs associated with the network."
                  items:
                    type: string
                state:
                  type: string
                  description: "The current state of the network."
                id:
                  type: string
                  description: "The unique ID of the network."
          required:
            - spec
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: ".status.conditions[?(@.type=='Ready')].status"
        - name: SYNCED
          type: string
          jsonPath: ".status.conditions[?(@.type=='Synced')].status"
        - name: EXTERNAL-NAME
          type: string
          jsonPath: ".metadata.annotations.crossplane\\.io/external-name"
        - name: STATE
          type: string
          jsonPath: ".status.state"
        - name: AGE
          type: date
          jsonPath: ".metadata.creationTimestamp"
